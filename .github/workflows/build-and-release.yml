name: Build and release CsoundVST3

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: macos
            runner: macos-latest
            build_dir: build-macos
            archive_glob: build-macos/*.zip
          - os_name: linux
            runner: ubuntu-latest
            build_dir: build-linux
            archive_glob: build-linux/*.zip
          - os_name: windows
            runner: windows-latest
            build_dir: build-windows
            archive_glob: build-windows/*.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies - macOS
        if: matrix.os_name == 'macos'
        shell: bash
        run: |
          brew update
          brew install \
            cmake \
            ninja \
            ccache \
            curl \
            git \
            pkg-config \
            csound

      - name: Install dependencies - Linux
        if: matrix.os_name == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            ccache \
            git \
            curl \
            pkg-config \
            zip \
            csound \
            libcsound64-dev \
            libasound2-dev \
            libjack-jackd2-dev \
            ladspa-sdk \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libglu1-mesa-dev \
            mesa-common-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev || \
          sudo apt-get install -y libwebkit2gtk-4.0-dev

      - name: Install dependencies - Windows
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          choco install -y cmake ninja git ccache curl 7zip
          choco install -y csound --ignore-checksums

      - name: Install JUCE
        shell: bash
        run: |
          mkdir -p include
          if [ ! -d include/JUCE/.git ]; then
            rm -rf include/JUCE
            git clone --depth 1 https://github.com/juce-framework/JUCE.git include/JUCE
          fi

      - name: Import Apple Developer ID certificate
        if: matrix.os_name == 'macos' && startsWith(github.ref, 'refs/tags/')
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_PASSWORD }}

      - name: Set ccache environment
        shell: bash
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> "$GITHUB_ENV"
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> "$GITHUB_ENV"
          echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> "$GITHUB_ENV"

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-ccache-

      - name: Configure - macOS
        if: matrix.os_name == 'macos'
        shell: bash
        env:
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        run: |
          cmake -S CsoundVST3 -B build-macos -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15 \
            -DCMAKE_INSTALL_PREFIX="${PWD}/dist" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCSOUND_AC_ENABLE_CODESIGN=${{ startsWith(github.ref, 'refs/tags/') && 'ON' || 'OFF' }} \
            -DCSOUND_AC_ENABLE_NOTARIZATION=${{ startsWith(github.ref, 'refs/tags/') && 'ON' || 'OFF' }}

      - name: Configure - Linux
        if: matrix.os_name == 'linux'
        shell: bash
        run: |
          cmake -S CsoundVST3 -B build-linux -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX="${PWD}/dist" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Configure - Windows
        if: matrix.os_name == 'windows'
        shell: bash
        run: |
          cmake -S CsoundVST3 -B build-windows -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX="${PWD}/dist" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build, stage, sign, and archive
        shell: bash
        env:
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        run: |
          cmake --build "${{ matrix.build_dir }}" --parallel --target archive_dist

      - name: Notarize archive - macOS tags only
        if: matrix.os_name == 'macos' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          cmake --build build-macos --target notarize_dist

      - name: Show ccache statistics
        shell: bash
        run: ccache --show-stats || true

      - name: Upload build archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: csound-vst3-${{ matrix.os_name }}
          path: ${{ matrix.archive_glob }}
          if-no-files-found: error

      - name: Upload archives to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_glob }}
