name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_TYPE: RelWithDebInfo
  CSOUND_VERSION_REF: develop
  JUCE_VERSION_REF: 8.0.8
  CSOUND_AC_ENABLE_CODESIGN: ${{ startsWith(github.ref, 'refs/tags/v') && 'ON' || 'OFF' }}
  CSOUND_AC_ENABLE_NOTARIZATION: ${{ startsWith(github.ref, 'refs/tags/v') && 'ON' || 'OFF' }}

jobs:
  build:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            os: macos-14
            platform_name: macos
            build_dir: build-macos
            csound_install: /tmp/csound-install
            archive_glob: build-macos/csound-vst3-*-darwin.zip
          - name: Linux
            os: ubuntu-24.04
            platform_name: linux
            build_dir: build-linux
            csound_install: /tmp/csound-install
            archive_glob: build-linux/csound-vst3-*-linux.zip
          - name: Windows
            os: windows-2022
            platform_name: windows
            build_dir: build-windows
            csound_install: C:/csound-install
            archive_glob: build-windows/csound-vst3-*-windows.zip

    steps:
      - name: Check out csound-vst3
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew update
          brew install \
            bison \
            ccache \
            cmake \
            curl \
            eigen \
            flex \
            gettext \
            git \
            liblo \
            libsndfile \
            ninja \
            portaudio \
            python \
            swig

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            ccache \
            cmake \
            curl \
            flex \
            g++ \
            gcc \
            git \
            libasound2-dev \
            libcurl4-openssl-dev \
            libffi-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libjack-jackd2-dev \
            liblo-dev \
            libpulse-dev \
            libsndfile1-dev \
            libwebkit2gtk-4.1-dev \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            ninja-build \
            pkg-config \
            portaudio19-dev \
            python3 \
            python3-dev \
            swig

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-ccache
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-libsndfile
            mingw-w64-x86_64-liblo
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-portaudio
            mingw-w64-x86_64-python
            mingw-w64-x86_64-swig

      - name: Import Apple code signing certificate
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_PASSWORD }}

      - name: Configure ccache
        shell: bash
        run: |
          ccache --set-config=max_size=1G || true
          ccache --zero-stats || true

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            ~/Library/Caches/ccache
            C:\Users\runneradmin\AppData\Local\ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Check out Csound
        uses: actions/checkout@v4
        with:
          repository: csound/csound
          ref: ${{ env.CSOUND_VERSION_REF }}
          path: csound-source
          submodules: recursive

      - name: Build and install Csound - macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf csound-build "${{ matrix.platform.csound_install }}"
          cmake -S csound-source -B csound-build -G Ninja \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_INSTALL_PREFIX="${{ matrix.platform.csound_install }}" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBUILD_TESTS=OFF \
            -DBUILD_STATIC_LIBRARY=OFF \
            -DBUILD_MULTI_CORE=ON \
            -DBUILD_PYTHON_INTERFACE=OFF \
            -DINSTALL_PYTHON_INTERFACE=OFF \
            -DUSE_DOUBLE=ON \
            -DCMAKE_PREFIX_PATH="/opt/homebrew;/usr/local"
          cmake --build csound-build --parallel
          cmake --install csound-build
          find "${{ matrix.platform.csound_install }}" -maxdepth 4 \( -type f -o -type d \) | sort | head -200

      - name: Build and install Csound - Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf csound-build "${{ matrix.platform.csound_install }}"
          cmake -S csound-source -B csound-build -G Ninja \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_INSTALL_PREFIX="${{ matrix.platform.csound_install }}" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBUILD_TESTS=OFF \
            -DBUILD_STATIC_LIBRARY=OFF \
            -DBUILD_MULTI_CORE=ON \
            -DBUILD_PYTHON_INTERFACE=OFF \
            -DINSTALL_PYTHON_INTERFACE=OFF \
            -DUSE_DOUBLE=ON
          cmake --build csound-build --parallel
          cmake --install csound-build
          find "${{ matrix.platform.csound_install }}" -maxdepth 4 \( -type f -o -type d \) | sort | head -200

      - name: Build and install Csound - Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          rm -rf csound-build /c/csound-install
          cmake -S csound-source -B csound-build -G Ninja \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_INSTALL_PREFIX=/c/csound-install \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBUILD_TESTS=OFF \
            -DBUILD_STATIC_LIBRARY=OFF \
            -DBUILD_MULTI_CORE=ON \
            -DBUILD_PYTHON_INTERFACE=OFF \
            -DINSTALL_PYTHON_INTERFACE=OFF \
            -DUSE_DOUBLE=ON
          cmake --build csound-build --parallel
          cmake --install csound-build
          find /c/csound-install -maxdepth 4 \( -type f -o -type d \) | sort | head -200

      - name: Build CsoundVST3 - macOS
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          CSOUND_ROOT: ${{ matrix.platform.csound_install }}
          CMAKE_PREFIX_PATH: ${{ matrix.platform.csound_install }}
          CMAKE_FRAMEWORK_PATH: ${{ matrix.platform.csound_install }}/Library/Frameworks;${{ matrix.platform.csound_install }}/Frameworks
          PATH: ${{ matrix.platform.csound_install }}/bin:/usr/local/bin:/opt/homebrew/bin:${{ env.PATH }}
          DYLD_LIBRARY_PATH: ${{ matrix.platform.csound_install }}/lib:${{ env.DYLD_LIBRARY_PATH }}
          DYLD_FRAMEWORK_PATH: ${{ matrix.platform.csound_install }}/Library/Frameworks:${{ matrix.platform.csound_install }}/Frameworks:${{ env.DYLD_FRAMEWORK_PATH }}
        run: |
          set -euo pipefail
          rm -rf "${{ matrix.platform.build_dir }}" dist
          cmake -S CsoundVST3 -B "${{ matrix.platform.build_dir }}" -G Ninja \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/dist" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCSOUND_ROOT="${{ matrix.platform.csound_install }}" \
            -DCMAKE_PREFIX_PATH="${{ matrix.platform.csound_install }}" \
            -DCMAKE_FRAMEWORK_PATH="${{ matrix.platform.csound_install }}/Library/Frameworks;${{ matrix.platform.csound_install }}/Frameworks" \
            -DCSOUND_AC_ENABLE_CODESIGN="YES" \
            -DCSOUND_AC_ENABLE_NOTARIZATION="YES"
          cmake --build "${{ matrix.platform.build_dir }}" --parallel --target notarize_dist

      - name: Verify macOS distribution archive
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          glob="${{ matrix.platform.archive_glob }}"
          matches=( ${glob} )
          if (( ${#matches[@]} != 1 ))
          then
            echo "Expected exactly one archive matching ${glob}, got ${#matches[@]}."
            exit 1
          fi
          bash "${GITHUB_WORKSPACE}/CsoundVST3/codesign-check.bash" "${GITHUB_WORKSPACE}/${matches[0]}"

      - name: Build CsoundVST3 - Linux
        if: runner.os == 'Linux'
        shell: bash
        env:
          CSOUND_ROOT: ${{ matrix.platform.csound_install }}
          CMAKE_PREFIX_PATH: ${{ matrix.platform.csound_install }}
          PKG_CONFIG_PATH: ${{ matrix.platform.csound_install }}/lib/pkgconfig:${{ matrix.platform.csound_install }}/lib64/pkgconfig:${{ env.PKG_CONFIG_PATH }}
          LD_LIBRARY_PATH: ${{ matrix.platform.csound_install }}/lib:${{ matrix.platform.csound_install }}/lib64:${{ env.LD_LIBRARY_PATH }}
          PATH: ${{ matrix.platform.csound_install }}/bin:${{ env.PATH }}
        run: |
          set -euo pipefail
          rm -rf "${{ matrix.platform.build_dir }}" dist
          cmake -S CsoundVST3 -B "${{ matrix.platform.build_dir }}" -G Ninja \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/dist" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCSOUND_ROOT="${{ matrix.platform.csound_install }}" \
            -DCMAKE_PREFIX_PATH="${{ matrix.platform.csound_install }}"
          cmake --build "${{ matrix.platform.build_dir }}" --parallel --target archive_dist

      - name: Build CsoundVST3 - Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          CSOUND_ROOT: C:/csound-install
          CMAKE_PREFIX_PATH: C:/csound-install
          PKG_CONFIG_PATH: /c/csound-install/lib/pkgconfig
          PATH: /c/csound-install/bin:/mingw64/bin:/usr/bin:${{ env.PATH }}
        run: |
          set -euo pipefail
          rm -rf "${{ matrix.platform.build_dir }}" dist
          cmake -S CsoundVST3 -B "${{ matrix.platform.build_dir }}" -G Ninja \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/dist" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCSOUND_ROOT=C:/csound-install \
            -DCMAKE_PREFIX_PATH=C:/csound-install
          cmake --build "${{ matrix.platform.build_dir }}" --parallel --target archive_dist

      - name: Show ccache statistics
        if: always()
        shell: bash
        run: ccache --show-stats || true

      - name: Upload build archive
        uses: actions/upload-artifact@v4
        with:
          name: csound-vst3-${{ matrix.platform.platform_name }}
          path: ${{ matrix.platform.archive_glob }}
          if-no-files-found: error

      - name: Upload release archive
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.platform.archive_glob }}
